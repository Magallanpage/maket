  <div class="bottom-grid">
    <div class="widget-card" style="text-align:center;">
      <div class="widget-title">공포 &amp; 탐욕 나침반</div>
      <div class="compass-gauge-wrap">
        <!-- 원본 SVG 게이지 -->
        <svg viewBox="0 0 160 90" xmlns="http://www.w3.org/2000/svg">
          <!-- ... 원본 SVG 내용 ... -->
        </svg>

      <span class="gauge-val" id="fgVal" style="color:var(--muted)">—</span>

    <!-- 도미넌스 & 시장 요약 (static 또는 나중에 API로 확장 가능) -->
    <!-- ... -->

<script>
// ── 시계 & 헬퍼 함수 (원본 그대로) ────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent =
    now.toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
}
setInterval(updateClock, 1000);
updateClock();

function fmtPrice(p, isCrypto = false) {
  if (!isCrypto) return p.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (p >= 1000) return p.toLocaleString('en-US', {maximumFractionDigits:0});
  if (p >= 1)    return p.toFixed(2);
  return p.toFixed(4);
}

function genSpark(isUp) {
  const pts = []; let y = isUp ? 22 : 6;
  for (let x = 0; x <= 60; x += 10) {
    y = Math.max(2, Math.min(26, y + (Math.random() - (isUp ? 0.38 : 0.62)) * 9));
    pts.push(x + ',' + y);
  }
  return 'M' + pts.join(' L');
}

// ── API 연동 ────────────────────────────────────────────────────────────────
async function fetchCryptoData() {
  try {
    const ids = 'bitcoin,ethereum,binancecoin,solana,ripple,dogecoin';
    const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('CoinGecko 응답 오류');
    const data = await res.json();

    const CRYPTOS = [
      {ticker:'BTC',  name:'비트코인',     price: data.bitcoin?.usd       ?? 0, chg: data.bitcoin?.usd_24h_change     ?? 0, abs: 0},
      {ticker:'ETH',  name:'이더리움',     price: data.ethereum?.usd      ?? 0, chg: data.ethereum?.usd_24h_change    ?? 0, abs: 0},
      {ticker:'BNB',  name:'바이낸스코인', price: data.binancecoin?.usd   ?? 0, chg: data.binancecoin?.usd_24h_change ?? 0, abs: 0},
      {ticker:'SOL',  name:'솔라나',       price: data.solana?.usd        ?? 0, chg: data.solana?.usd_24h_change     ?? 0, abs: 0},
      {ticker:'XRP',  name:'리플',         price: data.ripple?.usd        ?? 0, chg: data.ripple?.usd_24h_change     ?? 0, abs: 0},
      {ticker:'DOGE', name:'도지코인',     price: data.dogecoin?.usd      ?? 0, chg: data.dogecoin?.usd_24h_change   ?? 0, abs: 0},
    ];

    // 절대 변화액 임의 계산 (실제로는 24h volume이나 prev price 필요하지만 근사치)
    CRYPTOS.forEach(c => {
      c.abs = Math.abs((c.price * c.chg / 100).toFixed(c.price > 10 ? 0 : 2));
    });

    renderCards(CRYPTOS, 'cryptoGrid', true);

    // 티커도 업데이트
    updateTicker([...CRYPTOS]); // stocks는 static이라 생략하거나 합침
  } catch (err) {
    console.error('Crypto API 오류:', err);
    document.getElementById('cryptoGrid').innerHTML = '<div style="color:var(--down);padding:20px;">데이터 로드 실패</div>';
  }
}

async function fetchFearGreed() {
  try {
    const res = await fetch('https://api.alternative.me/fng/?limit=1');
    const {data} = await res.json();
    const val = parseInt(data[0].value, 10);
    initGauge(val);
  } catch (err) {
    console.error('F&G API 오류:', err);
    initGauge(50); // fallback
  }
}

// ── Static 데이터 (주식 & 경제) ─────────────────────────────────────────────
const STOCKS = [
  {ticker:'S&P500',  name:'S&P 500',     price:6506.48, chg:-1.51, abs:100.0 },
  {ticker:'NASDAQ',  name:'나스닥 종합',   price:21647,  chg:-2.0,  abs:443  },
  {ticker:'DOW',     name:'다우 존스',     price:45577,   chg:-1.0,  abs:444  },
  {ticker:'KOSPI',   name:'코스피',        price:2781,    chg:0.45,  abs:12   },
  // ... 필요시 추가
];

const ECON = [
  // ... 원본 ECON 배열 그대로 ...
];

// ── 렌더 함수들 (원본과 동일 – renderCards, renderEcon, initGauge, renderDominance 등) ──
// ... paste your original render functions here ...

// ── Ticker 업데이트 (crypto 중심으로) ───────────────────────────────────────
function updateTicker(cryptos) {
  const items = cryptos.map(c => `
    <span class="ticker-item">
      <span class="ticker-sym">${c.ticker}</span>
      ${fmtPrice(c.price, true)}
      <span style="color:${c.chg>=0?'var(--up)':'var(--down)'}">${c.chg>=0?'+':''}${c.chg.toFixed(2)}%</span>
    </span>
    <span class="ticker-sep">✦</span>
  `).join('');
  document.getElementById('tickerContent').innerHTML = items + items;
}

// ── 초기화 & 자동 갱신 ──────────────────────────────────────────────────────
async function initDashboard() {
  renderCards(STOCKS, 'stockGrid', false);
  renderEcon();
  renderDominance();
  renderSummary();
  createChart('1D');
  updateLastUpdate();

  // API 데이터 로드
  await Promise.all([
    fetchCryptoData(),
    fetchFearGreed()
  ]);

  // 5분마다 crypto & F&G 갱신
  setInterval(() => {
    fetchCryptoData();
    fetchFearGreed();
    updateLastUpdate();
  }, 5 * 60 * 1000);
}

window.addEventListener('load', initDashboard);
</script>
